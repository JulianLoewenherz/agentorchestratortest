port: 3000
defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers:
    - desktop
projects:
  agentorchestratortest:
    name: agentorchestratortest
    sessionPrefix: age
    repo: JulianLoewenherz/agentorchestratortest
    path: /Users/julianloewenherz/Desktop/agentorchestratortest
    defaultBranch: main
    agentRules: |-
      Always run tests before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).
      Link issue numbers in commit messages.
      Write clear commit messages that explain WHY, not just WHAT.
